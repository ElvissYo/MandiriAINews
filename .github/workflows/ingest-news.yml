name: Scheduled News Ingestion

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: Extraction source
        required: true
        default: auto
        type: choice
        options:
          - auto
          - gdelt
          - rss
          - newsapi
      limit:
        description: Maximum articles to ingest
        required: true
        default: "20"
        type: string

permissions:
  contents: read

concurrency:
  group: scheduled-news-ingestion
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      NEWS_GDELT_ENABLED: "true"
      NEWS_GDELT_QUERY: "Indonesia OR ASEAN"
      NEWS_GDELT_TIMESPAN: "1d"
      NEWS_GDELT_MAX_RECORDS: "50"
      NEWS_GDELT_COOLDOWN_SECONDS: "0"
      NEWS_GDELT_CACHE_TTL_MINUTES: "15"
      NEWS_GDELT_MAX_RETRIES: "3"
      NEWS_RSS_URLS: "https://news.google.com/rss?hl=id&gl=ID&ceid=ID:id"
      NEWS_RETRY_ATTEMPTS: "3"
      NEWS_RETRY_DELAY_SECONDS: "1"
      NEWS_FULL_CONTENT_ENABLED: "true"
      NEWS_FULL_CONTENT_MAX_ARTICLES: "10"
      NEWS_CONTENT_TIMEOUT: "8"
      NEWS_CONTENT_RETRY_ATTEMPTS: "2"
      NEWS_CONTENT_EXTRACTION_DELAY_SECONDS: "0.5"
      LLM_SUMMARY_API_URL: ${{ secrets.LLM_SUMMARY_API_URL }}
      LLM_SUMMARY_API_KEY: ${{ secrets.LLM_SUMMARY_API_KEY }}
      LLM_SUMMARY_MODEL: ${{ secrets.LLM_SUMMARY_MODEL }}
      AI_EMBEDDING_PROVIDER: ${{ vars.AI_EMBEDDING_PROVIDER || 'none' }}
      AI_EMBEDDING_MODEL: ${{ vars.AI_EMBEDDING_MODEL || 'sentence-transformers/all-MiniLM-L6-v2' }}
      AI_EMBEDDING_DIMENSIONS: "384"
      PIPELINE_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.source || 'auto' }}
      PIPELINE_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '20' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data_pipeline/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r data_pipeline/requirements.txt

      - name: Run pipeline tests
        run: python -m unittest discover -s data_pipeline/tests -v

      - name: Ingest news
        run: >-
          python -m data_pipeline.main_pipeline
          --source "$PIPELINE_SOURCE"
          --limit "$PIPELINE_LIMIT"
          --live
